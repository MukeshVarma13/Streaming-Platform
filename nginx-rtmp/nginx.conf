worker_processes auto;
#error_log  logs/error.log;

events {
    worker_connections 1024;
}

# RTMP configuration
rtmp {
    server {
        listen 1935; # Listen on standard RTMP port
        chunk_size 4000;
        # ping 30s;
        # notify_method get;

        # This application is to accept incoming stream
        application live {
            live on;
            allow publish all;
            allow play all;
            record off;
            # record_path /tmp/recordings;
            # record_unique on;
            # record_suffix .flv;

            on_publish http://host.docker.internal:8080/api/auth/publish;
            on_publish_done http://host.docker.internal:8080/api/stream/complete;

            # exec_push /usr/local/bin/ffmpeg -i rtmp://localhost:1935/$app/$name -async 1 -vsync -1
            #     -c:v libx264 -c:a aac -b:v 5000k -b:a 128k -vf "scale=1920:1080" -tune zerolatency -preset veryfast -g 48 -sc_threshold 0 -f flv rtmp://localhost:1935/show/$name_1080p
            #     -c:v libx264 -c:a aac -b:v 2500k -b:a 128k -vf "scale=1280:720" -tune zerolatency -preset veryfast -g 48 -sc_threshold 0 -f flv rtmp://localhost:1935/show/$name_720p
            #     -c:v libx264 -c:a aac -b:v 800k -b:a 96k -vf "scale=640:360" -tune zerolatency -preset veryfast -g 48 -sc_threshold 0 -f flv rtmp://localhost:1935/show/$name_360p;
            # drop_idle_publisher 60s;
        # }

        # application show {
            # live on; 
            # deny play all;

            hls on; 
            hls_fragment 2s;
            hls_playlist_length 16s;
            hls_path /mnt/hls/;      

            hls_cleanup off;
            hls_continuous on;
            hls_nested on;
            
            # hls_variant _1080p BANDWIDTH=4128000, RESOLUTION=1920x1080;
            # hls_variant _480p BANDWIDTH=1096000, RESOLUTION=854x480;
            # hls_variant _360p BANDWIDTH=664000, RESOLUTION=640x360;

            # dash on;
            # dash_path /mnt/dash/;
            # dash_fragment 2s;
            # dash_playlist_length 16s;
        }
