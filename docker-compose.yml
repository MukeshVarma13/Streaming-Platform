services:
  backend:
    build: ./stream-backend
    container_name: streaming-backend
    depends_on:
      - mysql
      - redis
      - elasticsearch
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/streaming_platform
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_URL: elasticsearch:9200
      ELASTICSEARCH_USERNAME: root
      ELASTICSEARCH_PASSWORD: test
      FFMPEG_URL: http://ffmpeg-worker:5000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - videos-data:/videos
      - profile-pics-data:/profile-pics

  frontend:
    build: ./stream-frontend
    container_name: streaming-frontend
    ports:
      - "5173:80"

  nginx-rtmp:
    build: ./nginx-rtmp
    container_name: nginx-rtmp
    ports:
      - "1935:1935"
      # - "8000:8080"
    # volumes:
    # - E:/FullStack-Learning/StreamingPlatform/recordings:/tmp/recordings
    # - E:/FullStack-Learning/StreamingPlatform/nginx-live-videos:/mnt/hls/
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ffmpeg-worker:
    build: ./ffmpeg-worker
    container_name: ffmpeg-worker
    ports:
      - "5000:5000"
    volumes:
      - videos-data:/worker/output
    environment:
      REDIS_HOST: redis
      PYTHONUNBUFFERED: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8
    container_name: mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: streaming_platform
    volumes:
      - mysql-data:/var/lib/mysql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.9
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - 5601:5601
    depends_on:
      - elasticsearch

volumes:
  mysql-data:
  es-data:
  videos-data:
  profile-pics-data:
